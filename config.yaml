# config.yaml - Central configuration for training and detection.
data:
  positives_dir: data/positives
  negatives_dir: data/negatives
  backgrounds_dir: data/backgrounds
  patch_size: 64
  val_split: 0.2
  num_workers: 4                        # May need to set it to 0 for MacOS (If running from a notebook)
  manifest_file: data/manifest.csv
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std:  [0.229, 0.224, 0.225]

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_patience: 5
  lr_factor: 0.5
  checkpoint_dir: checkpoints
  runs_dir: runs

model:
  dropout: 0.5

detection:
  checkpoint: checkpoints/best_model.pth
  detection_threshold: 0.85
  nms_iou_threshold: 0.3
  scales: [1.0, 0.75, 0.5, 0.25]
  step_size: 16
  inference_batch_size: 256          # max patches per GPU forward pass; reduce if OOM

recording:
  seconds_after_detection: 5
  output_dir: recordings
  fourcc: mp4v
  fps: 20
